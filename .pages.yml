# ==========================================
# PAGES CMS HEADLESS DASHBOARD DESIGNER
# ==========================================
media:
  input: static/images
  output: /images

collections:
  - name: post
    label: Journal Entries
    type: folder
    path: content/post
    extension: md
    format: frontmatter-yaml
    view:
      title: title
      subtitle: date
      description: description
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Publishing Date
        type: datetime
        required: true
      - name: draft
        label: Draft Status
        type: boolean
        default: false
      - name: description
        label: SEO Description (Snippets)
        type: string
      - name: summary
        label: Feed Card Summary Text
        type: text
      - name: tags
        label: Navigation Tags
        type: list
        field:
          type: string
      - name: showToc
        label: Show Table of Contents
        type: boolean
        default: false
      - name: body
        label: Journal Body (Bilingual Prose)
        type: rich-text