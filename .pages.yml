media:
  input: static/images
  output: /images

content:
  - name: post
    label: Journal Entries
    type: collection
    path: content/post
    format: yaml-frontmatter
    subfolders: true
    filename: "{year}-{month}-{day}-{slug}.md"
    view:
      fields: [title, date, draft]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Publishing Date
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm:ssXXX
      - name: draft
        label: Draft Status
        type: boolean
        default: false
      - name: description
        label: SEO Description (Snippets)
        type: string
      - name: summary
        label: Feed Card Summary Text
        type: text
      - name: tags
        label: Navigation Tags
        type: string
        list: true
      - name: showToc
        label: Show Table of Contents
        type: boolean
        default: false
      - name: cover
        label: Cover Image
        type: object
        fields:
          - name: image
            label: Image
            type: image
          - name: alt
            label: Alt Text
            type: string
      - name: body
        label: Journal Body (Bilingual Prose)
        type: rich-text